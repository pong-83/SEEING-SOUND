<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEEING SOUND : Echoes in Space</title>
<style>
html,body{
  margin:0;padding:0;overflow:hidden;
  background:black;height:100%;
  cursor:none; /* 기본 커서 숨김 */
}
#msg{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:white;font-family:sans-serif;
  opacity:0.8;transition:opacity 1s;
}
</style>
</head>
<body>

<div id="msg">Click to send your first signal.</div>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/tone@14.8.42/build/Tone.js"></script>
<script>
// ===============================
// 기본 세팅
let audioStarted=false;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,100);
camera.position.z=5;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const msg=document.getElementById("msg");



// ===============================
// 오디오 세팅 (맑고 청아한 소리)
const synth = new Tone.Synth({
  oscillator: { type: "sine" },
  envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.8 }
});
const filter = new Tone.Filter({ type: "highpass", frequency: 1000 });
const reverb = new Tone.Reverb({ decay: 2, wet: 0.3 }).toDestination();
synth.connect(filter); filter.connect(reverb);

// ===============================
// 저장
const rings=[]; const dots=[];

// ===============================
// 블러+빛나는 커서
const cursorCanvas = document.createElement("canvas");
cursorCanvas.width = 64; cursorCanvas.height = 64;
const ctx = cursorCanvas.getContext("2d");
ctx.fillStyle = "rgba(36,231,255,0.6)";
ctx.filter = "blur(8px)";
ctx.beginPath();
ctx.arc(32,32,20,0,Math.PI*2);
ctx.fill();
const cursorTexture = new THREE.CanvasTexture(cursorCanvas);
const cursorMaterial = new THREE.SpriteMaterial({ map: cursorTexture, transparent:true, opacity:0.8 });
const cursorSprite = new THREE.Sprite(cursorMaterial);
cursorSprite.scale.set(0.02,0.02,1);
scene.add(cursorSprite);

// ===============================
// 마우스 움직임
document.addEventListener('mousemove', (e)=>{
  const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
  const mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  const vector = new THREE.Vector3(mouseX, mouseY, 0.5).unproject(camera);
  cursorSprite.position.copy(vector);
});

// ===============================
// 파동 생성
function createRing(x,y){
  const geo = new THREE.RingGeometry(0.05,0.08,64);
  const mat = new THREE.MeshBasicMaterial({ color:0x24e7ff, transparent:true, opacity:0.8, blending: THREE.AdditiveBlending });
  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(x,y,0);
  scene.add(mesh);
  rings.push({ mesh:mesh, radius:0.08, lastSound:0 });
}

// ===============================
// 점 생성
function createDotsOnWave(x,y,radius,note){
  const count = 2;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const dist = radius + (Math.random()*0.2 - 0.1);
    const posX = x + Math.cos(angle)*dist;
    const posY = y + Math.sin(angle)*dist;
    const size = Math.max(0.005, 0.01 * Math.pow(1 - radius / 6, 1.5));
    const opacity = Math.max(0.1, 1-radius/6);
    const geo = new THREE.SphereGeometry(size,6,6);

    // 음에 따라 색 지정
    let color;
    if(note==="E5") color=0x24e7ff;
    else if(note==="G5") color=0x9f6bff;
    else if(note==="A5") color=0xffffff;
    else if(note==="B5") color=0x88ccff;
    else color=0xccffff;

    const mat = new THREE.MeshBasicMaterial({ color:color, transparent:true, opacity:opacity });
    const dot = new THREE.Mesh(geo, mat);
    dot.position.set(posX,posY,0);
    dot.userData.birth = performance.now();
    dot.userData.life = 800;
    scene.add(dot);
    dots.push(dot);
  }
}

// ===============================
// 클릭 이벤트
document.body.addEventListener("click", async(e)=>{
  if(!audioStarted){ await Tone.start(); audioStarted=true; msg.style.opacity=0; }

  const mouse=new THREE.Vector2((e.clientX/window.innerWidth)*2-1,-(e.clientY/window.innerHeight)*2+1);
  const raycaster=new THREE.Raycaster();
  raycaster.setFromCamera(mouse,camera);
  const plane=new THREE.Plane(new THREE.Vector3(0,0,1),0);
  const point=new THREE.Vector3();
  raycaster.ray.intersectPlane(plane,point);

  createRing(point.x,point.y);

  const notes = ["E5","G5","A5","B5","D6","E6"];
  const note = notes[Math.floor(Math.random()*notes.length)];
  synth.triggerAttackRelease(note,"16n");

  createDotsOnWave(point.x, point.y, 0.1, note);
});

// ===============================
// 애니메이션 루프
function animate(){
  requestAnimationFrame(animate);

  // 파동 확산
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i], mesh=r.mesh;
    r.radius += 0.03;
    mesh.geometry.dispose();
    mesh.geometry = new THREE.RingGeometry(r.radius-0.03, r.radius,64);
    mesh.material.opacity -=0.01;

    if(r.radius - r.lastSound > 0.8){
      const notes=["E5","G5","A5","B5","D6"];
      const note=notes[Math.floor(Math.random()*notes.length)];
      synth.triggerAttackRelease(note,"32n");
      createDotsOnWave(mesh.position.x, mesh.position.y, r.radius, note);
      r.lastSound = r.radius;
    }
    if(Math.random()<0.1) createDotsOnWave(mesh.position.x, mesh.position.y, r.radius,"E5");

    if(r.radius>6||mesh.material.opacity<=0){
      scene.remove(mesh); rings.splice(i,1);
    }
  }

  // 점 회전 & 번쩍 효과
  for(let i=dots.length-1;i>=0;i--){
    const d=dots[i];
    const age = performance.now() - d.userData.birth;
    const t = age / d.userData.life;
    if(t>=1){ scene.remove(d); dots.splice(i,1); continue; }
    d.scale.setScalar(1-t);
    d.material.opacity = 1-t;
  }

  // ⭐ 커서 반짝
  const blinkT = performance.now()*0.005;
  cursorSprite.material.opacity = 0.5 + Math.sin(blinkT)*0.3;

  renderer.render(scene,camera);
}
animate();

// ===============================
// 리사이즈
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
